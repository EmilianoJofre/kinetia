version: '3.9'

services:
  # ─── Kinetia ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kinetia_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: >
      bash -c "rm -f tmp/pids/server.pid
      && bundle exec rails db:prepare
      && bundle exec rails server -b '0.0.0.0'"
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/kinetia_production
      RAILS_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "false"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - api

  # ─── Panorama ───────────────────────────────────────────────────────────────
  panorama_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PANORAMA_DB_USER}
      POSTGRES_PASSWORD: ${PANORAMA_DB_PASSWORD}
      POSTGRES_DB: panorama_production
    volumes:
      - panorama_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PANORAMA_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  panorama_api:
    build:
      context: ./panorama/backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${PANORAMA_DB_USER}:${PANORAMA_DB_PASSWORD}@panorama_db:5432/panorama_production
      RAILS_ENV: production
      SECRET_KEY_BASE: ${PANORAMA_SECRET_KEY_BASE}
      RAILS_MASTER_KEY: ${PANORAMA_RAILS_MASTER_KEY}
      FRONTEND_URL: https://panorama.kinetia.cl
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "false"
    depends_on:
      panorama_db:
        condition: service_healthy

  panorama_web:
    build:
      context: ./panorama/frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - panorama_api

  # ─── Caddy (reverse proxy compartido) ───────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - api
      - web
      - panorama_api
      - panorama_web

volumes:
  postgres_data:
  panorama_postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
