version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kinetia
      POSTGRES_PASSWORD: kinetia_secret
      POSTGRES_DB: kinetia_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetia"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails db:seed && bundle exec rails server -b '0.0.0.0'"
    volumes:
      - ./apps/api:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://kinetia:kinetia_secret@db:5432/kinetia_development
      RAILS_ENV: development
      JWT_SECRET: kinetia_jwt_secret_key_2024
      RAILS_MASTER_KEY: ""
      SECRET_KEY_BASE: kinetia_secret_key_base_development_only
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:3000
    depends_on:
      - api

volumes:
  postgres_data:
  bundle_cache:
  web_node_modules:
